<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>Request Diff</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="panel.css"/>
</head>
<body>
<div class="app">

  <div class="toolbar">
    <span class="logo">≠ Request Diff</span>
    <div class="toolbar-sep"></div>
    <input class="filter-input" id="filter" placeholder="URL 필터 (예: /api/users)"/>
    <button class="btn" id="btn-capture" title="네트워크 요청 목록 새로고침">↻ 새로고침</button>
    <button class="btn accent" id="btn-diff" title="선택된 A·B 비교">▷ DIFF 실행</button>
    <button class="btn danger" id="btn-clear">✕ 초기화</button>
    <span class="capture-count" id="capture-count"></span>
  </div>

  <div class="body">

    <div class="list-panel">
      <div class="list-header">캡처된 요청 — A·B 버튼으로 비교 대상 선택</div>
      <div class="list-scroll" id="list-scroll">
        <div class="list-empty" id="list-empty">
          <div>요청이 없어요</div>
          <div class="hint">페이지를 이동하거나 새로고침하면<br/>XHR / Fetch 요청이 자동 캡처됩니다</div>
        </div>
      </div>
    </div>

    <div class="diff-panel">
      <div class="diff-header" id="diff-header" style="display:none">
        <div class="diff-label diff-label-a" id="hdr-a">A —</div>
        <div class="diff-label diff-label-b" id="hdr-b">B —</div>
        <div class="diff-sep"></div>
        <div class="diff-stats" id="diff-stats"></div>
        <div class="mode-tabs">
          <button class="mode-tab active" data-mode="unified">Unified</button>
          <button class="mode-tab" data-mode="sbs">Side-by-side</button>
          <button class="mode-tab" data-mode="raw">Raw</button>
        </div>
      </div>

      <div class="diff-body" id="diff-body">
        <div class="diff-placeholder">
          <div class="big">≠</div>
          <p>두 요청을 선택하면<br/>git diff 스타일로 비교해드려요</p>
          <div class="hint">왼쪽 목록에서 A · B 버튼을 눌러 비교 대상을 선택하세요</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="panel.js"></script>
</body>
</html>
